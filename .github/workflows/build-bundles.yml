name: build-bundles

# Builds the light and heavy RTrace bundles
# All submodules are public and cloned over https, so no secrets are required.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  # Pinned relocatable interpreter (astral-sh/python-build-standalone, install_only
  # = relocatable). Verify/update this pin when bumping the bundled Python.
  PYTHON_BUILD_STANDALONE_URL: "https://github.com/astral-sh/python-build-standalone/releases/download/20250106/cpython-3.11.11+20250106-x86_64-unknown-linux-gnu-install_only.tar.gz"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    strategy:
      fail-fast: false
      matrix:
        edition: [light, heavy]
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install build dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            git curl ca-certificates sudo gnupg \
            cmake build-essential g++-multilib \
            python3 python3-dev \
            zlib1g-dev libunwind-dev libsnappy-dev liblz4-dev libxxhash-dev \
            binutils-dev binutils-multiarch-dev
          update-ca-certificates

      - name: Install .NET SDK 6.0 (for FunSeeker)
        run: |
          set -eux
          # Ubuntu 22.04 ships dotnet-sdk-6.0 in its own archive; no Microsoft
          # repo needed (unlike 24.04, whose archive only has dotnet 8).
          apt-get install -y --no-install-recommends dotnet-sdk-6.0

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native artifacts
        run: |
          set -eux
          # 'sudo' is a no-op shim under the root container but build-native.sh calls it.
          packaging/build-native.sh --prefix "$GITHUB_WORKSPACE/staging/rtrace"

      - name: Assemble ${{ matrix.edition }} bundle
        run: |
          set -eux
          packaging/build-bundle.sh \
            --prefix "$GITHUB_WORKSPACE/staging/rtrace" \
            --edition "${{ matrix.edition }}" \
            --python-url "$PYTHON_BUILD_STANDALONE_URL"

      - name: Package tarball + checksum
        run: |
          set -eux
          OUT="rtrace-${{ matrix.edition }}-linux-x64.tar.gz"
          tar -C "$GITHUB_WORKSPACE/staging" -czf "$OUT" rtrace
          sha256sum "$OUT" > "$OUT.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtrace-${{ matrix.edition }}-linux-x64
          path: |
            rtrace-${{ matrix.edition }}-linux-x64.tar.gz
            rtrace-${{ matrix.edition }}-linux-x64.tar.gz.sha256

  # Install each bundle on a CLEAN ubuntu:22.04 (no build tools, no system
  # python packages)
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    strategy:
      fail-fast: false
      matrix:
        edition: [light, heavy]
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: rtrace-${{ matrix.edition }}-linux-x64

      - name: Install bundle
        run: |
          set -eux
          sha256sum -c rtrace-${{ matrix.edition }}-linux-x64.tar.gz.sha256
          tar -C /opt -xzf rtrace-${{ matrix.edition }}-linux-x64.tar.gz
          ln -s /opt/rtrace/bin/rtrace /usr/local/bin/rtrace
          test "$(cat /opt/rtrace/EDITION)" = "${{ matrix.edition }}"

      - name: Trace /bin/ls (mode 1)
        run: |
          set -eux
          mkdir /tmp/smoke
          rtrace --logdir /tmp/smoke --mode 1 -- /bin/ls /
          # the coverage report must exist and attribute functions to modules
          /opt/rtrace/python/bin/python3 - <<'EOF'
          import glob, json
          reports = glob.glob("/tmp/smoke/function-executed-*.json")
          assert reports, "no coverage report produced"
          report = json.load(open(reports[0]))
          assert report, "coverage report is empty"
          total = sum(len(funcs) for funcs in report.values())
          print(f"OK: {total} executed functions across {len(report)} modules")
          EOF

      - name: Check nucleus boundary detection
        run: |
          set -eux
          export RTRACE_HOME=/opt/rtrace
          export LD_LIBRARY_PATH=/opt/rtrace/lib
          /opt/rtrace/python/bin/python3 -c '
          from rtrace.boundary_detection import boundary_detection_nucleus
          entries = boundary_detection_nucleus("/bin/ls")
          assert len(entries) > 50, f"too few entries: {len(entries)}"
          print(f"OK: nucleus found {len(entries)} function entries in /bin/ls")'

      - name: Check edition gating
        run: |
          set -eux
          if [ "${{ matrix.edition }}" = "heavy" ]; then
            /opt/rtrace/python/bin/python3 -c "import angr, capstone, networkx; print('OK: heavy deps import')"
          else
            # light must refuse mode 0 with a clear error instead of crashing later
            if rtrace --logdir /tmp/refused --mode 0 -- /bin/true; then
              echo "light edition accepted mode 0; it must refuse" >&2
              exit 1
            fi
          fi

  # On v* tags: publish the smoke-tested tarballs (+ sha256 checksums) as a
  # GitHub Release. Needs no secrets beyond the workflow's GITHUB_TOKEN.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          pattern: rtrace-*-linux-x64
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          cat > notes.md <<EOF
          Prebuilt RTrace bundles for Linux x86-64 (glibc >= 2.35: Ubuntu 22.04+, Debian 12+, Fedora 36+, RHEL 9+).

          | File | Edition | Modes |
          |---|---|---|
          | \`rtrace-light-linux-x64.tar.gz\` | light | 1 |
          | \`rtrace-heavy-linux-x64.tar.gz\` | heavy | 0 + 1 |

          ## Verify your download

          \`\`\`sh
          sha256sum -c rtrace-light-linux-x64.tar.gz.sha256
          \`\`\`

          ## Install

          \`\`\`sh
          mkdir -p ~/.local/share ~/.local/bin
          tar -C ~/.local/share -xzf rtrace-light-linux-x64.tar.gz
          ln -sf ~/.local/share/rtrace/bin/rtrace ~/.local/bin/rtrace
          \`\`\`
          EOF
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "rtrace $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --verify-tag \
            rtrace-*-linux-x64.tar.gz \
            rtrace-*-linux-x64.tar.gz.sha256
